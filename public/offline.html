<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sem ligação — VN Commerce</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9fafb; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem; }
    .card { background: white; border-radius: 1.5rem; padding: 2.5rem; text-align: center; max-width: 360px; box-shadow: 0 4px 6px -1px rgba(0,0,0,.08); }
    .icon { font-size: 4rem; margin-bottom: 1rem; }
    h1 { font-size: 1.25rem; font-weight: 700; color: #111827; margin-bottom: .5rem; }
    p { color: #6b7280; font-size: .875rem; margin-bottom: 1.5rem; line-height: 1.6; }
    button { background: #f97316; color: white; border: none; border-radius: .75rem; padding: .75rem 1.5rem; font-size: .875rem; font-weight: 600; cursor: pointer; transition: background .2s; }
    button:hover { background: #ea6c0b; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>Sem ligação à internet</h1>
    <p>Verifique a sua ligação e tente novamente. Algumas páginas podem estar disponíveis em modo offline.</p>
    <button onclick="window.location.reload()">Tentar novamente</button>
  </div>
</body>
</html>
